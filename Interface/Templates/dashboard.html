<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta http-equiv="refresh" content="5">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f0f2f5; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .status { padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .pending { background: #fff3cd; color: #856404; }
        .completed { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .btn { padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 4px; display: inline-block; }
        .btn-logout { background: #dc3545; }
        input[type="file"] { display: none; }
        .upload-label { background: #007bff; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hello, {{ username }}</h1>
        <div>
            <label for="file" class="upload-label">+ New Request</label>
            <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data" style="display:inline;">
                <input type="file" name="file" id="file" accept="image/*" onchange="this.form.submit()">
            </form>
            <a href="/logout" class="btn btn-logout">Logout</a>
        </div>
    </div>
    <div class="queue">
        {% for req in requests %}
        <div class="card">
            <div>
                <strong>Request #{{ req[0] }}</strong>
                <div style="font-size: 12px; color: #666;">{{ req[4] or 'Processing...' }}</div>
            </div>
            <div class="status {{ req[3] }}">
                {% if req[3] == 'completed' %}
                    {{ req[4] }} ({{ req[5] }}%)
                {% elif req[3] == 'error' %}
                    Error
                {% else %}
                    Processing
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
